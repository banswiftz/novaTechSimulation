<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaTech — หน้าผู้ดำเนินเกม</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Password screen -->
  <div class="auth-screen" id="auth-screen">
    <div class="card auth-box">
      <h1>หน้าผู้ดำเนินเกม</h1>
      <p>กรุณาใส่รหัสผ่านเพื่อเข้าสู่ระบบ</p>
      <div class="form-group">
        <input class="form-input" type="password" id="admin-password" placeholder="รหัสผ่าน" />
      </div>
      <p id="auth-error" style="display:none; color:#f05252; font-size:13px; margin-bottom:10px;"></p>
      <button class="btn btn-primary btn-full" id="auth-btn">เข้าสู่ระบบ</button>
    </div>
  </div>

  <!-- Main admin UI -->
  <div id="admin-ui" style="display:none;">

    <!-- Sticky top bar -->
    <div style="position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--border); padding:14px 20px;">
      <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; max-width:1400px; margin:0 auto;">

        <!-- Brand + progress -->
        <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
          <span style="font-size:16px; font-weight:700; color:var(--primary);">NovaTech — ผู้ดำเนินเกม</span>
          <div class="progress-steps" id="admin-progress"></div>
        </div>

        <!-- Controls -->
        <div style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
          <span id="phase-indicator" style="font-size:13px; color:var(--text-muted); margin-right:4px;"></span>
<select id="jump-select" style="background:var(--surface); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px 10px; font-size:13px; cursor:pointer;">
            <option value="-1">— เลือกสถานการณ์ —</option>
          </select>
          <button class="btn btn-primary" id="start-next-btn">▶ เริ่มเกม</button>
          <button class="btn btn-ghost btn-sm" id="back-btn" disabled>⏪ ย้อนกลับ</button>
          <button class="btn btn-success" id="reveal-btn" disabled>เปิดผลและอัปเดตคะแนน</button>
          <button class="btn btn-ghost btn-sm" id="reset-btn">รีเซ็ตเกม</button>
        </div>
      </div>
    </div>

    <!-- Game over banner -->
    <div style="max-width:1400px; margin:0 auto; padding:0 20px;">
      <div class="game-over-banner" id="admin-game-over" style="margin-top:16px;">
        <div class="go-title">รอโหวตไล่ออก</div>
        <p id="admin-go-reason"></p>
      </div>
    </div>

    <!-- Situation summary bar -->
    <div id="sit-summary-bar" style="display:none; background:var(--surface); border-bottom:1px solid var(--border); padding:12px 20px;">
      <div style="max-width:1400px; margin:0 auto;">
        <!-- Title row -->
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <span id="sit-type-bar" class="situation-type" style="margin-bottom:0;"></span>
          <span id="sit-title-bar" style="font-weight:700; font-size:15px;"></span>
          <button id="sit-toggle-btn" class="btn btn-ghost btn-sm" style="margin-left:4px; font-size:11px;">▼ รายละเอียด</button>
          <div style="margin-left:auto; font-size:13px; color:var(--text-muted);">
            โหวตรวม: <strong id="total-votes-bar" style="color:var(--text);">0</strong> /
            <strong id="total-possible-bar" style="color:var(--text);">0</strong>
          </div>
        </div>
        <!-- Collapsible detail panel -->
        <div id="sit-detail-panel" style="display:none; margin-top:10px; padding-top:10px; border-top:1px solid var(--border);">
          <p id="sit-desc-bar" style="font-size:13px; color:var(--text-muted); margin-bottom:10px; line-height:1.6;"></p>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div style="background:var(--bg); border-radius:6px; padding:10px;">
              <div style="font-size:11px; font-weight:700; color:#4f8ef7; margin-bottom:4px;">ตัวเลือก A</div>
              <div id="sit-opt-a-bar" style="font-size:13px; font-weight:600;"></div>
              <div id="sit-opt-a-desc-bar" style="font-size:12px; color:var(--text-muted); margin-top:4px;"></div>
            </div>
            <div style="background:var(--bg); border-radius:6px; padding:10px;">
              <div style="font-size:11px; font-weight:700; color:#f59e0b; margin-bottom:4px;">ตัวเลือก B</div>
              <div id="sit-opt-b-bar" style="font-size:13px; font-weight:600;"></div>
              <div id="sit-opt-b-desc-bar" style="font-size:12px; color:var(--text-muted); margin-top:4px;"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Groups table -->
    <div style="max-width:1600px; margin:0 auto; padding:20px;">
      <div id="no-groups-msg" style="text-align:center; padding:60px 20px; color:var(--text-muted);">
        <p style="font-size:16px;">ยังไม่มีผู้เล่นเข้าร่วม</p>
        <p style="font-size:13px; margin-top:8px;">แชร์ลิงก์ให้ผู้เข้าร่วมเพื่อเข้าร่วมกลุ่มของตน</p>
      </div>
      <div style="overflow-x:auto;">
        <table id="groups-table" class="vote-table" style="display:none; width:100%; min-width:860px; border-collapse:collapse;">
          <thead id="groups-thead"></thead>
          <tbody id="groups-tbody"></tbody>
        </table>
      </div>
    </div>

  </div>

  <div id="toast-container"></div>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
