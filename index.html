<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaTech — เข้าร่วมเกม</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="join-screen">
    <div class="join-box">
      <div class="join-logo">NovaTech</div>
      <p class="join-sub">Boardroom Crisis Simulation</p>

      <div class="card">
        <!-- Card selection (voter only, shown after join) -->
        <div id="card-selection" style="display:none;">
          <p style="font-size:16px; font-weight:700; margin-bottom:4px;">เลือกการ์ดพิเศษ</p>
          <p style="font-size:13px; color:#7A9A95; margin-bottom:16px;">เลือก 1 ใบจาก 2 ใบ เพื่อใช้ในระหว่างเกม</p>
          <div id="card-grid" class="card-selection-grid"></div>
          <button class="btn btn-primary btn-full mt-16" id="confirm-cards-btn" disabled>ยืนยันการ์ด (0/1)</button>
          <p id="card-error" style="display:none; color:#e04848; font-size:13px; margin-top:10px;"></p>
        </div>

        <div id="waiting-for-game" style="display:none; text-align:center; padding: 24px 0;">
          <div class="spinner" style="width:32px;height:32px;border:3px solid rgba(168,217,204,0.35);border-top-color:#00887A;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;"></div>
          <p style="color:#7A9A95;">รอผู้ดำเนินเกมเริ่มสถานการณ์...</p>
          <p id="joined-as" style="margin-top:10px;font-size:13px;color:#7A9A95;"></p>
          <div id="selected-cards-display" style="margin-top:16px;"></div>
        </div>

        <div id="join-form">
          <div class="form-group">
            <label class="form-label" for="player-name">ชื่อของคุณ</label>
            <input class="form-input" type="text" id="player-name" placeholder="เช่น สิริพร" autocomplete="off" />
          </div>

          <div class="form-group">
            <label class="form-label" for="role-select">ตำแหน่งของคุณ</label>
            <select class="form-input" id="role-select">
              <option value="">— เลือกตำแหน่ง —</option>
              <option value="CFO">CFO — ประธานเจ้าหน้าที่ฝ่ายการเงิน</option>
              <option value="CMO">CMO — ประธานเจ้าหน้าที่ฝ่ายการตลาด</option>
              <option value="COO">COO — ประธานเจ้าหน้าที่ฝ่ายปฏิบัติการ</option>
              <option value="CHRO">CHRO — ประธานเจ้าหน้าที่ฝ่ายทรัพยากรบุคคล</option>
              <option value="CLO">CLO — ประธานเจ้าหน้าที่ฝ่ายกฎหมาย</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="group-number">หมายเลขกลุ่ม</label>
            <input class="form-input" type="number" id="group-number" placeholder="เช่น 3" min="1" max="20" />
          </div>

          <div class="form-group">
            <label class="form-label" for="access-mode">สิทธิ์ของคุณ</label>
            <select class="form-input" id="access-mode">
              <option value="viewer">ผู้ชม — ดูสถานการณ์และคะแนนได้</option>
              <option value="voter">ผู้โหวต — โหวตเลือกทางออกให้กลุ่ม</option>
            </select>
            <p style="font-size:11px; color:#7A9A95; margin-top:4px;">แต่ละกลุ่มมีผู้โหวตได้ 1 คนเท่านั้น</p>
          </div>

          <button class="btn btn-primary btn-full" id="join-btn">เข้าร่วมเกม</button>
          <p id="join-error" style="display:none; color:#e04848; font-size:13px; margin-top:10px;"></p>
        </div>
      </div>

      <p class="text-muted text-center mt-16" style="font-size:12px;">
        ผู้ดำเนินเกม? <a href="admin.html" style="color:#00887A;">เปิดหน้า Admin</a>
      </p>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="js/join.js"></script>
</body>
</html>
