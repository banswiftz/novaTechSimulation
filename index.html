<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaTech — เข้าร่วมเกม</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="join-screen">
    <div class="join-box">
      <div class="join-logo">NovaTech</div>
      <p class="join-sub">Boardroom Crisis Simulation</p>

      <div class="card">
        <div id="waiting-for-game" style="display:none; text-align:center; padding: 24px 0;">
          <div class="spinner" style="width:32px;height:32px;border:3px solid #2e3348;border-top-color:#4f8ef7;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px;"></div>
          <p style="color:#8892a4;">รอผู้ดำเนินเกมเริ่มสถานการณ์...</p>
          <p id="joined-as" style="margin-top:10px;font-size:13px;color:#8892a4;"></p>
        </div>

        <div id="join-form">
          <div class="form-group">
            <label class="form-label" for="player-name">ชื่อของคุณ</label>
            <input class="form-input" type="text" id="player-name" placeholder="เช่น สิริพร" autocomplete="off" />
          </div>

          <div class="form-group">
            <label class="form-label" for="group-number">หมายเลขกลุ่ม</label>
            <input class="form-input" type="number" id="group-number" placeholder="เช่น 3" min="1" max="20" />
          </div>

          <button class="btn btn-primary btn-full" id="join-btn">เข้าร่วมเกม</button>
          <p id="join-error" style="display:none; color:#f05252; font-size:13px; margin-top:10px;"></p>
        </div>
      </div>

      <p class="text-muted text-center mt-16" style="font-size:12px;">
        ผู้ดำเนินเกม? <a href="admin.html" style="color:#4f8ef7;">เปิดหน้า Admin</a>
      </p>
    </div>
  </div>

  <div id="toast-container"></div>
  <script type="module" src="js/join.js"></script>
</body>
</html>
