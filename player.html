<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaTech — หน้าผู้เล่น</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Removed/Reset overlay -->
  <div id="removed-overlay" style="display:none; position:fixed; inset:0; background:rgba(15,17,23,.95); z-index:9999; align-items:center; justify-content:center; text-align:center; padding:24px;">
    <div>
      <div style="font-size:40px; margin-bottom:16px;">&#128075;</div>
      <h2 id="removed-headline" style="font-size:22px; font-weight:700; margin-bottom:8px;">เกมถูกรีเซ็ต</h2>
      <p id="removed-sub" style="color:#8892a4; margin-bottom:24px;">กรุณาเข้าร่วมใหม่อีกครั้ง</p>
      <a href="index.html" class="btn btn-primary">เข้าร่วมเกมใหม่</a>
    </div>
  </div>

  <!-- Top bar -->
  <div class="topbar">
    <span class="brand">NovaTech</span>
    <div class="player-info">
      <span id="player-name-display" style="font-weight:600; font-size:14px;"></span>
      <span id="role-badge" class="role-badge"></span>
      <button class="btn btn-ghost btn-sm" id="logout-btn" style="margin-left:8px;">ออกจากเกม</button>
    </div>
  </div>

  <div class="container">

    <!-- KPI row: personal + company -->
    <div style="display:grid; grid-template-columns: 160px 1fr; gap:16px; align-items:start; margin-bottom:20px;">
      <!-- Personal KPI -->
      <div class="card" style="padding:16px;">
        <div class="card-title">คะแนน KPI ของฉัน</div>
        <div class="kpi-display">
          <div id="kpi-value" class="kpi-value high">50</div>
          <div id="kpi-label" class="kpi-label"></div>
        </div>
      </div>

      <!-- Company + All KPIs -->
      <div class="card">
        <div class="card-title">ดัชนีชี้วัด</div>
        <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:8px;" id="player-kpi-grid">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>

    <!-- Main area -->
    <div class="card" id="main-area">

      <!-- State: waiting -->
      <div id="state-lobby" class="waiting-state">
        <div class="spinner"></div>
        <p>รอผู้ดำเนินเกมเริ่มสถานการณ์...</p>
      </div>

      <!-- State: situation display (read-only) -->
      <div id="state-situation" style="display:none;">
        <div style="display:flex; align-items:center; gap:12px; margin-bottom:12px;">
          <span id="sit-type" class="situation-type"></span>
        </div>
        <div id="sit-title" class="situation-title"></div>
        <div id="sit-desc" class="situation-desc"></div>

        <div class="options-grid" style="margin-top:20px;">
          <div class="option-btn" style="cursor:default; opacity:0.8;">
            <div class="opt-label" style="color:#4f8ef7;">ตัวเลือก A</div>
            <div class="opt-title" id="opt-a-title"></div>
            <div class="opt-desc" id="opt-a-desc"></div>
          </div>
          <div class="option-btn" style="cursor:default; opacity:0.8;">
            <div class="opt-label" style="color:#f59e0b;">ตัวเลือก B</div>
            <div class="opt-title" id="opt-b-title"></div>
            <div class="opt-desc" id="opt-b-desc"></div>
          </div>
        </div>

        <p style="text-align:center; color:#8892a4; font-size:14px; margin-top:16px;">
          รอผู้ดำเนินเกมเลือกทางออก...
        </p>
      </div>

      <!-- State: end game -->
      <div id="state-end" style="display:none;" class="end-screen">
        <h2 id="end-headline">จบการจำลองสถานการณ์</h2>
        <p class="end-sub" id="end-sub">NovaTech Boardroom Crisis Simulation ได้สิ้นสุดลงแล้ว</p>
        <div id="final-scores" style="max-width:400px; margin:0 auto;"></div>
      </div>

    </div>

    <!-- Progress indicator -->
    <div class="mt-16">
      <div class="progress-steps" id="progress-steps"></div>
    </div>

  </div>

  <div id="toast-container"></div>
  <script type="module" src="js/player.js"></script>
</body>
</html>
